---
- name: Converge
  hosts: all
  become: true
  vars:
    ci_mode: true
    couchdb_version: "3.3.3"
    couchdb_data_path: "/opt/services/couchdb"
    couchdb_domain: "koma.ewutelo.cloud"
    couchdb_uid: 5984
    couchdb_memory_limit: "512M"
    couchdb_memory_reservation: "128M"
    vault_couchdb_user: "obsidian"
    vault_couchdb_password: "test_password_molecule_32chars_ok"
  pre_tasks:
    - name: Créer le réseau proxy-net pour Molecule
      community.docker.docker_network:
        name: proxy-net
        state: present
  roles:
    - role: couchdb
