---
# vault.yml sese — CHIFFRER avec : ansible-vault encrypt inventory/sese/group_vars/all/vault.yml
#
# Génération des secrets :
#   vault_couchdb_user     : Manuel (ex: obsidian)
#   vault_couchdb_password : openssl rand -base64 32 | tr -d '='
#
# IMPORTANT : Ce fichier doit être chiffré avant tout commit :
#   ansible-vault encrypt inventory/sese/group_vars/all/vault.yml

vault_couchdb_user: "CHANGER_MOI_COUCHDB_USER"
vault_couchdb_password: "CHANGER_MOI_COUCHDB_PASSWORD_MIN32CHARS"
